<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!--
    黄金比（フィボナッチ数列: 8, 13, 21, 34, 55, 89）によるプロポーション設計
    全体バウンディングボックス: 89x89 (余白 5.5 でキャンバスの完全中央に配置)
  -->
  <g transform="translate(0, 0)">
    <!-- ベースとなる四角形（サイズ: 55x55） -->
    <rect x="5.5" y="5.5" width="55" height="55" rx="16" fill="#EFF6FF" />
    <rect x="5.5" y="5.5" width="55" height="55" rx="16" fill="none" stroke="#2563EB" stroke-width="8" />
    
    <!-- 中心の "E" 
         長さ: 34 と 21
         Y軸の間隔: 13
         線の太さ: 8 
         左右の余白も完璧に等間隔になるよう計算 -->
    <path d="M 16 26.5 L 50 26.5" fill="none" stroke="#60A5FA" stroke-width="8" stroke-linecap="round" />
    <path d="M 16 39.5 L 37 39.5" fill="none" stroke="#60A5FA" stroke-width="8" stroke-linecap="round" />

    <!-- 右下のAIスパーク（サイズ: 34x34） 
         55(ベース) + 34(スパーク) = 89(全体の幅) となり、
         ベースとスパークの面積・対角距離が完全に黄金比になります -->
    <path d="M 77.5 60.5
             C 79.5 69.5, 85.5 75.5, 94.5 77.5
             C 85.5 79.5, 79.5 85.5, 77.5 94.5
             C 75.5 85.5, 69.5 79.5, 60.5 77.5
             C 69.5 75.5, 75.5 69.5, 77.5 60.5 Z"
          fill="#3B82F6" />
  </g>
</svg>